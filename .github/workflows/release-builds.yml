name: Build release binaries

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS ${{ matrix.runtime }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        runtime:
          - osx-arm64
          - osx-x64

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SnapRestore/SnapRestore.csproj -r ${{ matrix.runtime }}

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Build DMG
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: |
          VERSION="${VERSION#v}"
          SnapRestore/Packaging/macOS/package.sh "${{ matrix.runtime }}"

      - name: Verify DMG and create checksum
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          dmgPath="artifacts/macos/${{ matrix.runtime }}/SnapRestore-${version}-${{ matrix.runtime }}.dmg"

          if [ ! -f "$dmgPath" ]; then
            echo "DMG not found: $dmgPath"
            exit 1
          fi

          shasum -a 256 "$dmgPath" > "$dmgPath.sha256"

      - name: Upload DMG to release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          version="${RELEASE_TAG#v}"
          dmgPath="artifacts/macos/${{ matrix.runtime }}/SnapRestore-${version}-${{ matrix.runtime }}.dmg"

          gh release upload "$RELEASE_TAG" \
            "$dmgPath" \
            "$dmgPath.sha256" \
            --clobber

  windows:
    name: Build Windows win-x64
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore SnapRestore/SnapRestore.csproj -r win-x64

      - name: Test
        shell: pwsh
        run: dotnet test --configuration Release --no-restore

      - name: Publish Windows build
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          $publishDir = "artifacts/windows/win-x64/SnapRestore"
          $zipPath = "artifacts/windows/win-x64/SnapRestore-$version-win-x64.zip"

          dotnet publish SnapRestore/SnapRestore.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            --no-restore `
            -o $publishDir `
            /p:Version=$version `
            /p:AssemblyVersion=$version `
            /p:FileVersion=$version `
            /p:PublishSingleFile=true `
            /p:EnableCompressionInSingleFile=true

          if (Test-Path "$publishDir/Tools") {
            Get-ChildItem "$publishDir/Tools" -Directory |
              Where-Object { $_.Name -ne "win-x64" } |
              Remove-Item -Recurse -Force
          }

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

          if (!(Test-Path $zipPath)) {
            throw "ZIP not found: $zipPath"
          }

          Get-FileHash $zipPath -Algorithm SHA256 |
            ForEach-Object { "$($_.Hash.ToLower())  $(Split-Path $zipPath -Leaf)" } |
            Set-Content "$zipPath.sha256"

      - name: Upload ZIP to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          $version = $env:RELEASE_TAG -replace '^v', ''
          $zipPath = "artifacts/windows/win-x64/SnapRestore-$version-win-x64.zip"

          gh release upload $env:RELEASE_TAG `
            $zipPath `
            "$zipPath.sha256" `
            --clobber